<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>拍摄流程演示入口</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .hub-wrap {
        margin-top: 10px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .flow-card {
        background: #ececef;
        border-radius: 14px;
        padding: 14px 12px 12px;
      }
      .flow-title {
        margin: 0 0 6px;
        font-size: 24px;
        font-weight: 700;
        color: #1e2128;
      }
      .flow-text {
        margin: 0 0 10px;
        color: #696d76;
        font-size: 14px;
        line-height: 1.45;
      }
      .hub-btn {
        width: 100%;
        height: 44px;
        border-radius: 22px;
        background: linear-gradient(90deg, #f58d30, #d61f17);
        color: #fff;
        text-decoration: none;
        font-size: 16px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <main class="phone">
      <div class="statusbar">
        <span>10:04</span>
        <div class="status-icons">
          <span>•••</span>
          <span class="battery" aria-hidden="true"></span>
        </div>
      </div>

      <header class="topbar">
        <h1>流程演示入口</h1>
      </header>

      <section class="hub-wrap">
        <article class="flow-card">
          <p class="flow-title">普通用户流程</p>
          <p class="flow-text">选择拍摄模式 -> 拍摄准备（无三脚架高度模块）</p>
          <a class="hub-btn" href="./shooting-mode.html">进入普通用户流程</a>
        </article>

        <article class="flow-card">
          <p class="flow-title">Chameleon 用户流程</p>
          <p class="flow-text">选择拍摄模式 -> 拍摄准备（含三脚架高度：高 3 米 / 低 1.4-1.8 米）</p>
          <a class="hub-btn" href="./shooting-mode.html?user=chameleon">进入 Chameleon 流程</a>
        </article>
      </section>
    </main>
  </body>
  </html>
